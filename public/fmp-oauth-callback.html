<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connecting…</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e2e8f0;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; padding: 24px 32px; }
    .muted { color: #64748b; font-size: 13px; margin-top: 8px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="box">
    <div id="msg">Completing sign-in…</div>
    <div id="detail" class="muted"></div>
  </div>
  <script>
    (function () {
      // FileMaker appends the OAuth identifier to this return URL. Collect every
      // param from both query string and hash, then forward to the opener.
      var params = {};
      try { new URLSearchParams(window.location.search).forEach(function (v, k) { params[k] = v; }); } catch (e) {}
      try { if (window.location.hash) new URLSearchParams(window.location.hash.slice(1)).forEach(function (v, k) { params[k] = v; }); } catch (e) {}

      var identifier = params.identifier || params.Identifier || params.oauth_identifier || params.id || '';

      if (window.opener) {
        window.opener.postMessage({ type: 'fmp-oauth-callback', identifier: identifier, params: params }, window.location.origin);
        document.getElementById('msg').textContent = identifier ? 'Connected — you can close this window.' : 'No identifier received.';
        if (!identifier) document.getElementById('detail').textContent = JSON.stringify(params);
        setTimeout(function () { try { window.close(); } catch (e) {} }, identifier ? 400 : 4000);
      } else {
        document.getElementById('msg').textContent = identifier ? 'Identifier received.' : 'No identifier in callback.';
        document.getElementById('detail').textContent = JSON.stringify(params);
      }
    })();
  </script>
</body>
</html>
